# Nginx interno do container do frontend.
# Serve apenas os estáticos da SPA. O roteamento de /api/ para os
# backends é responsabilidade do Nginx gateway (atlas-infra/nginx).
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Cache agressivo para assets versionados (hash no nome do arquivo)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Fallback de SPA: qualquer rota desconhecida cai no index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
